name: 📉Performance Regression
description: clx compiled code got slower than expected
title: "📉 "
labels:
  - performance
body:
  - type: markdown
    attributes:
      value: |
        Use this template to report a performance regression in compiled code.
  - type: input
    id: clx_version_old
    attributes:
      label: ✅ Last known good clx version
    validations:
      required: true
  - type: input
    id: clx_version_new
    attributes:
      label: ❌ Regressed clx version
    validations:
      required: true
  - type: dropdown
    id: architecture
    attributes:
      label: 𒁈 CPU architecture
      options:
        - x86_64
        - ARM64
        - x86
        - ARM32
        - Other
  - type: dropdown
    id: os
    attributes:
      label: 💻 Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
  - type: textarea
    id: benchmark
    attributes:
      label: 📃 Lua benchmark script
      render: lua
    validations:
      required: true
  - type: textarea
    id: old_runtime
    attributes:
      label: ⏱️ Runtime / throughput (old version)
    validations:
      required: true
  - type: textarea
    id: new_runtime
    attributes:
      label: ⏱️ Runtime / throughput (new version)
    validations:
      required: true
  - type: dropdown
    id: measurement
    attributes:
      label: 📏 Measurement method
      options:
        - benchmark/run.sh
        - benchmark/run-hyperfine.sh
        - Manual timing
        - Other
  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
